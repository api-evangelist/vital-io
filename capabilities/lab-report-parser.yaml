naftiko: 1.0.0-alpha2
info:
  label: Vital Lab Report Parser API
  description: Vital Lab Report Parser API. 2 operations. Self-contained Naftiko capability covering the Lab Report Parser
    business surface of the Junction (Vital) health-data platform.
  tags:
  - Vital
  - Junction
  - Lab Report Parser
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    VITAL_API_KEY: VITAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: lab_report_parser
    baseUri: https://api.us.junction.com
    description: Vital Lab Report Parser API business capability. Self-contained, no shared references.
    resources:
    - name: lab-report-v1-parser-job
      path: /lab_report/v1/parser/job
      operations:
      - name: CreateLabReportParserJob
        method: POST
        description: Create Lab Report Parser Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: get_lab_report_parser_job_lab_report_v1_parser_job__job_id__get
        method: GET
        description: Get Lab Report Parser Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: job_id
          in: path
          type: string
          description: ''
          required: true
    auth:
      type: apiKey
      in: header
      name: X-Vital-API-Key
      valueFrom:
        env: VITAL_API_KEY

naftiko: 1.0.0-alpha2
info:
  label: Vital Link API
  description: Vital Link API. 14 operations. Self-contained Naftiko capability covering the Link business surface of the
    Junction (Vital) health-data platform.
  tags:
  - Vital
  - Junction
  - Link
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    VITAL_API_KEY: VITAL_API_KEY

        description: Deregister Provider
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: ''
          required: true
        - name: provider
          in: path
          type: string
          description: Provider slug. e.g., `oura`, `fitbit`, `garmin`.
          required: true
